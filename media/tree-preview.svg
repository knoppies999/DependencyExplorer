<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <!-- Illustrative mockup of the Dependencies view, not a literal screenshot. -->
  <rect width="860" height="600" fill="#1e1e1e"/>

  <!-- title bar -->
  <rect width="860" height="46" fill="#252526"/>
  <text x="20" y="29" fill="#cccccc" font-size="12" font-weight="600" letter-spacing="1">DEPENDENCIES</text>
  <g stroke="#c5c5c5" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- shield -->
    <path d="M792 15c4-2 8-2 12 0v9c0 6-4 10-12 13-8-3-12-7-12-13v-9z" transform="translate(0,0)"/>
    <!-- replace-all -->
    <path d="M746 16h14M746 16l4-4M746 16l4 4M768 30h-14M768 30l-4-4M768 30l-4 4"/>
    <!-- refresh -->
    <path d="M820 14a8 8 0 1 1-8 8" />
    <path d="M820 10l4 4-4 4"/>
  </g>

  <!-- helper: row template values baked in below -->
  <!-- row 1: web-frontend (expanded, vulnerable) -->
  <g transform="translate(0,60)">
    <path d="M18 6l6 6-6 6" stroke="#c5c5c5" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="rotate(90 21 12)"/>
    <rect x="40" y="2" width="20" height="20" rx="4" fill="#37373d"/>
    <text x="50" y="16" fill="#e8e8e8" font-size="11" text-anchor="middle" font-weight="700">JS</text>
    <text x="72" y="17" fill="#e8e8e8" font-size="14">web-frontend</text>
    <text x="840" y="17" fill="#f14c4c" font-size="13" text-anchor="end">⚠ 2 vulnerable · npm</text>
  </g>

  <!-- express: direct, vulnerable -->
  <g transform="translate(0,92)">
    <path d="M18 9h10" stroke="#c5c5c5" stroke-width="1.6"/>
    <path d="M62 3l6 6-6 6" stroke="#f14c4c" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="88" y="17" fill="#e8e8e8" font-size="14">express</text>
    <text x="840" y="17" fill="#f14c4c" font-size="13" text-anchor="end">4.17.1 · 2 vulnerabilities</text>
  </g>

  <!-- qs: transitive, vulnerable -->
  <g transform="translate(0,120)">
    <path d="M18 9h34" stroke="#c5c5c5" stroke-width="1.6"/>
    <path d="M96 3l6 6-6 6" stroke="#f14c4c" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="122" y="17" fill="#cfcfcf" font-size="14">qs</text>
    <text x="840" y="17" fill="#f14c4c" font-size="13" text-anchor="end">6.5.2 · 1 vulnerability</text>
  </g>

  <!-- lodash: direct, subtree-clean but shown vulnerable-yellow example -->
  <g transform="translate(0,152)">
    <path d="M18 9h10" stroke="#c5c5c5" stroke-width="1.6"/>
    <circle cx="65" cy="9" r="6" fill="none" stroke="#585858" stroke-width="1.6"/>
    <text x="88" y="17" fill="#e8e8e8" font-size="14">lodash</text>
    <text x="840" y="17" fill="#cccccc" font-size="13" text-anchor="end">4.17.21</text>
  </g>

  <!-- axios: direct, clean -->
  <g transform="translate(0,180)">
    <path d="M18 9h10" stroke="#c5c5c5" stroke-width="1.6"/>
    <rect x="60" y="3" width="12" height="12" rx="3" fill="none" stroke="#8a8a8a" stroke-width="1.6"/>
    <text x="88" y="17" fill="#e8e8e8" font-size="14">axios</text>
    <text x="840" y="17" fill="#cccccc" font-size="13" text-anchor="end">1.7.4</text>
  </g>

  <!-- row 2: pnpm-shop (collapsed, vulnerable) -->
  <g transform="translate(0,224)">
    <path d="M18 6l6 6-6 6" stroke="#c5c5c5" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="2" width="20" height="20" rx="4" fill="#37373d"/>
    <text x="50" y="16" fill="#e8e8e8" font-size="11" text-anchor="middle" font-weight="700">JS</text>
    <text x="72" y="17" fill="#e8e8e8" font-size="14">pnpm-shop</text>
    <text x="840" y="17" fill="#f14c4c" font-size="13" text-anchor="end">⚠ 3 vulnerable · pnpm</text>
  </g>

  <!-- row 3: api-server (collapsed, clean) -->
  <g transform="translate(0,260)">
    <path d="M18 6l6 6-6 6" stroke="#c5c5c5" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="2" width="20" height="20" rx="4" fill="#37373d"/>
    <text x="50" y="16" fill="#e8e8e8" font-size="11" text-anchor="middle" font-weight="700">JS</text>
    <text x="72" y="17" fill="#e8e8e8" font-size="14">api-server</text>
    <text x="840" y="17" fill="#cccccc" font-size="13" text-anchor="end">npm</text>
  </g>

  <!-- row 4: cpm-solution / ShippingService (collapsed, clean, NuGet) -->
  <g transform="translate(0,296)">
    <path d="M18 6l6 6-6 6" stroke="#c5c5c5" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="12" r="10" fill="none" stroke="#8a8a8a" stroke-width="1.6"/>
    <path d="M46 12h8M50 8v8" stroke="#8a8a8a" stroke-width="1.6"/>
    <text x="72" y="17" fill="#e8e8e8" font-size="14">ShippingService</text>
    <text x="840" y="17" fill="#cccccc" font-size="13" text-anchor="end">NuGet</text>
  </g>

  <!-- divider -->
  <line x1="0" y1="332" x2="860" y2="332" stroke="#2d2d2d" stroke-width="1"/>

  <!-- tooltip / callout card -->
  <g transform="translate(120,360)">
    <rect width="500" height="150" rx="8" fill="#252526" stroke="#454545"/>
    <text x="20" y="34" fill="#ffffff" font-size="16" font-weight="700">express  4.17.1</text>
    <text x="20" y="58" fill="#cccccc" font-size="13">Direct dependency of web-frontend (npm)</text>
    <text x="20" y="88" fill="#f14c4c" font-size="13" font-weight="600">⚠ Known vulnerabilities:</text>
    <text x="34" y="110" fill="#6ea8ff" font-size="13">— GHSA-rv95-896h-c2vc</text>
    <text x="34" y="130" fill="#6ea8ff" font-size="13">— GHSA-9c47-m6qq-7p4h</text>
  </g>

  <!-- callout arrow -->
  <path d="M118 122 L118 372" stroke="#f14c4c" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
</svg>
